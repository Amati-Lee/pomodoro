<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>番茄鐘</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overscroll-behavior:none;touch-action:pan-x pan-y}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,#e74c3c,#c0392b);padding:14px 20px;text-align:center;position:relative}
.header h1{font-size:20px;font-weight:600;color:#fff}
.header .ver{font-size:11px;opacity:.6;color:#fff}
.lock-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;align-items:center;gap:1px}
.lock-btn svg{width:38px;height:38px}
.lock-btn .lock-label{font-size:9px;color:#fff;opacity:.8}
.gear-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;cursor:pointer;padding:4px}

/* 活動列表 */
.activity-bar{background:#16213e;padding:8px 12px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.activity-bar::-webkit-scrollbar{display:none}
.act-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;margin-right:6px;background:#2d2d4e;color:#888;border:2px solid transparent;cursor:pointer;transition:.2s}
.act-chip.current{background:#e74c3c22;color:#e74c3c;border-color:#e74c3c;font-weight:600}
.act-chip.done{background:#27ae6033;color:#27ae60;border-color:#27ae60;text-decoration:line-through}
.act-chip.break-chip{background:#27ae6022;color:#666;font-size:11px;padding:4px 8px}
.act-chip.break-chip.current{color:#27ae60;border-color:#27ae60}

.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.timer-ring{position:relative;width:240px;height:240px;margin-bottom:16px}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring .bg{fill:none;stroke:#2d2d4e;stroke-width:8}
.timer-ring .progress{fill:none;stroke:#e74c3c;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.timer-ring.break .progress{stroke:#27ae60}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-text .activity-name{font-size:15px;color:#ccc;margin-bottom:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timer-text .time{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-text .label{font-size:13px;color:#888;margin-top:2px}
.timer-text .penalty-info{font-size:11px;color:#f39c12;margin-top:4px}

.controls{display:flex;gap:16px;margin-bottom:16px}
.ctrl-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{transform:scale(.9)}
.btn-start{background:#e74c3c;color:#fff}
.btn-start.running{background:#f39c12}
.btn-reset{background:#333;color:#aaa;position:relative;flex-direction:column;gap:0}
.btn-hint{display:block;font-size:9px;color:#666;line-height:1;margin-top:1px}
.btn-skip{background:#333;color:#aaa;position:relative;flex-direction:column;gap:0}

/* 進度與統計 */
.progress-section{width:100%;max-width:340px;margin-bottom:12px}
.progress-bar-bg{background:#2d2d4e;border-radius:8px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12);border-radius:8px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:4px}

.stats{background:#16213e;border-radius:12px;padding:12px 20px;text-align:center;width:100%;max-width:340px}
.stats .today{font-size:13px;color:#888}
.stats .count{font-size:28px;font-weight:700;color:#e74c3c;margin:2px 0}
.stats .count span{font-size:13px;font-weight:400;color:#888}
.stats .total-time{font-size:12px;color:#666}
.history-btn{width:100%;max-width:340px;margin-top:10px;padding:10px;background:#16213e;border:1px solid #333;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer;transition:.15s}
.history-btn:active{background:#2d2d4e}
.streak{font-size:12px;color:#f39c12;margin-top:4px}

/* 紀錄面板 */
.history-panel{max-height:80vh;overflow-y:auto}
.streak-summary{background:#16213e;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center}
.streak-summary .streak-num{font-size:36px;font-weight:700;color:#f39c12}
.streak-summary .streak-label{font-size:13px;color:#888;margin-top:2px}
.streak-summary .week-total{font-size:14px;color:#ccc;margin-top:8px}
.day-card{background:#16213e;border-radius:10px;margin-bottom:8px;overflow:hidden}
.day-card.today{border:1px solid #e74c3c44}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer}
.day-date{font-size:13px;color:#ccc}
.day-date .weekday{color:#888;margin-left:4px;font-size:11px}
.day-summary{display:flex;align-items:center;gap:6px}
.day-summary .day-min{font-size:16px;font-weight:600;color:#e74c3c}
.day-summary .day-min span{font-size:11px;font-weight:400;color:#888}
.day-summary .star{font-size:16px}
.day-detail{padding:0 12px 10px}
.day-act-group{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-top:1px solid #ffffff08}
.day-act-group .act-name{font-size:12px;color:#aaa}
.day-act-group .act-info{font-size:12px;color:#888;text-align:right}
.day-act-group .act-info b{color:#ccc;font-weight:600}
.day-times{font-size:11px;color:#555;margin-top:2px}
.no-record{text-align:center;color:#555;font-size:13px;padding:20px 0}

/* 完成列表 */
.done-list{width:100%;max-width:340px;margin-top:12px}
.done-list h3{font-size:12px;color:#666;margin-bottom:6px}
.done-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:#888}
.done-item .check{color:#27ae60}

/* 設定面板 */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 0}
.settings-overlay.show{display:flex}
.settings-panel{background:#1a1a2e;border-radius:16px;padding:20px;width:92%;max-width:380px;border:1px solid #333}
.settings-panel h2{font-size:18px;margin-bottom:12px;text-align:center}

.act-list{margin-bottom:12px}
.act-row{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px;background:#16213e;border-radius:10px}
.act-row input[type=text]{flex:1;min-width:0;background:#0f0f23;border:1px solid #333;border-radius:6px;padding:8px;font-size:14px;color:#fff;outline:none}
.act-row input[type=text]:focus{border-color:#e74c3c}
.act-row .min-adj{display:flex;align-items:center;gap:4px}
.act-row .min-btn{width:28px;height:28px;border-radius:50%;border:1px solid #555;background:#2d2d4e;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.act-row .min-btn:active{background:#e74c3c}
.act-row .min-val{font-size:15px;font-weight:600;min-width:28px;text-align:center}
.act-row .del-btn{background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;padding:4px}
.act-row .penalty-toggle{display:flex;align-items:center;gap:3px;font-size:11px;color:#888;cursor:pointer;white-space:nowrap}
.act-row .penalty-toggle input{accent-color:#f39c12;width:14px;height:14px}

.add-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:#2d2d4e;border:1px dashed #555;border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;margin-bottom:12px}
.add-act-btn:active{background:#333}

.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-row label{font-size:14px;color:#ccc}
.setting-row .adjuster{display:flex;align-items:center;gap:8px}
.adj-btn{width:32px;height:32px;border-radius:50%;border:1px solid #555;background:#2d2d4e;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.adj-btn:active{background:#e74c3c}
.adj-val{font-size:18px;font-weight:600;min-width:32px;text-align:center}

.settings-panel .close-btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:8px;padding:10px 32px;color:#fff;font-size:15px;cursor:pointer}

/* 預設活動按鈕 */
.preset-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-btn{padding:5px 10px;border-radius:14px;border:1px solid #555;background:#2d2d4e;color:#ccc;font-size:12px;cursor:pointer}
.preset-btn:active{background:#e74c3c;color:#fff}

/* 鎖定提示 */
.locked-toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#e74c3c;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:200;white-space:nowrap}
.locked-toast.show{display:block;animation:fadeout 2s forwards}
@keyframes fadeout{0%,70%{opacity:1}100%{opacity:0;display:none}}

/* 密碼面板 */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center}
.pin-overlay.show{display:flex}
.pin-panel{background:#1a1a2e;border-radius:16px;padding:24px;width:85%;max-width:300px;border:1px solid #333;text-align:center}
.pin-panel h3{font-size:16px;margin-bottom:6px;color:#fff}
.pin-panel .pin-sub{font-size:12px;color:#888;margin-bottom:16px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #555;transition:.15s}
.pin-dot.filled{background:#e74c3c;border-color:#e74c3c}
.pin-dot.wrong{border-color:#e74c3c;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{background:#2d2d4e;border:none;border-radius:50%;width:56px;height:56px;font-size:22px;color:#fff;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;transition:.1s}
.pin-key:active{background:#e74c3c;transform:scale(.9)}
.pin-key.del{font-size:16px;color:#e74c3c;background:transparent;border:1px solid #555}
.pin-key.cancel{font-size:13px;color:#888;background:transparent}
.pin-error{color:#e74c3c;font-size:12px;margin-top:10px;min-height:16px}

/* 全部完成 — 覆蓋整頁 */
.all-done{display:none;position:fixed;inset:0;z-index:50;background:rgba(26,26,46,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px 20px}
.all-done.show{display:flex;animation:fadeInUp .6s ease-out}
.all-done .big{font-size:80px;margin-bottom:12px;animation:celebrateBounce 1s ease-in-out infinite}
.all-done .msg{font-size:22px;color:#27ae60;font-weight:700;animation:glowPulse 2s ease-in-out infinite}
.all-done .sub{font-size:15px;color:#aaa;margin-top:8px}
.all-done .dismiss{margin-top:24px;background:#27ae60;border:none;border-radius:8px;padding:10px 28px;color:#fff;font-size:15px;cursor:pointer}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes celebrateBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 8px #27ae6044}50%{text-shadow:0 0 20px #27ae60aa}}
</style>
</head>
<body>

<div class="header">
  <button class="gear-btn" onclick="openSettings()">⚙️</button>
  <h1>🍅 番茄鐘 <span class="ver">v1.4</span></h1>
  <button class="lock-btn" id="lockBtn" onclick="toggleLock()">
    <div id="lockIcon" style="width:38px;height:38px"></div>
    <span class="lock-label" id="lockLabel">未鎖</span>
  </button>
</div>

<div class="activity-bar" id="activityBar"></div>

<div class="main">
  <div class="timer-ring" id="timerRing">
    <svg viewBox="0 0 200 200">
      <circle class="bg" cx="100" cy="100" r="90"/>
      <circle class="progress" id="progressRing" cx="100" cy="100" r="90"
        stroke-dasharray="565.49" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="activity-name" id="activityName"></div>
      <div class="time" id="timeDisplay">25:00</div>
      <div class="label" id="phaseLabel">準備開始</div>
      <div class="penalty-info" id="penaltyInfo"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-reset" id="resetBtn" title="長按 3 秒歸零">↺<span class="btn-hint">長按歸零</span></button>
    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">▶</button>
    <button class="ctrl-btn btn-skip" id="skipBtn" title="長按 3 秒跳過">⏭<span class="btn-hint">長按跳過</span></button>
  </div>

  <div class="progress-section">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="totalProgress"></div></div>
    <div class="progress-label">
      <span id="progressText">0 / 0 完成</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div class="stats">
    <div class="today">今日累計</div>
    <div class="count" id="todayCount">0 <span>分鐘專注</span></div>
    <div class="streak" id="streakInfo"></div>
  </div>

  <div style="display:flex;gap:8px;width:100%;max-width:340px;margin-top:10px">
    <button class="history-btn" onclick="openHistory()" style="flex:1;margin-top:0">📊 查看紀錄</button>
    <a href="rewards.html" class="history-btn" style="flex:1;margin-top:0;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center">🎁 獎勵兌換</a>
  </div>

  <div class="done-list" id="doneList">
    <h3>已完成</h3>
  </div>

</div>

<div class="all-done" id="allDone">
  <div class="big">🎉</div>
  <div class="msg">全部完成！</div>
  <div class="sub" id="allDoneSub"></div>
  <button class="dismiss" onclick="document.getElementById('allDone').classList.remove('show')">好棒！</button>
</div>

<!-- 每日紀錄面板 -->
<div class="settings-overlay" id="historyOverlay" onclick="closeHistory(event)">
  <div class="settings-panel history-panel" onclick="event.stopPropagation()">
    <h2>📊 每日紀錄</h2>
    <div class="streak-summary" id="streakSummary"></div>
    <div class="history-list" id="historyList"></div>
    <button class="close-btn" onclick="document.getElementById('historyOverlay').classList.remove('show')">關閉</button>
  </div>
</div>

<!-- 設定面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h2>⚙️ 活動排程</h2>
    <div class="preset-row">
      <button class="preset-btn" onclick="addPreset('🎻 練琴',25)">🎻 練琴</button>
      <button class="preset-btn" onclick="addPreset('📖 寫功課',25)">📖 寫功課</button>
      <button class="preset-btn" onclick="addPreset('📚 閱讀',20)">📚 閱讀</button>
      <button class="preset-btn" onclick="addPreset('🧮 數學',25)">🧮 數學</button>
      <button class="preset-btn" onclick="addPreset('🎨 畫畫',20)">🎨 畫畫</button>
      <button class="preset-btn" onclick="addPreset('🏃 運動',15)">🏃 運動</button>
    </div>
    <div class="act-list" id="actList"></div>
    <button class="add-act-btn" onclick="addActivity()">＋ 新增活動</button>
    <div class="setting-row">
      <label>☕ 休息時間（每項之間）</label>
      <div class="adjuster">
        <button class="adj-btn" onclick="adjustBreak(-1)">−</button>
        <span class="adj-val" id="breakVal">5</span><span style="color:#888">分</span>
        <button class="adj-btn" onclick="adjustBreak(1)">+</button>
      </div>
    </div>
    <button class="close-btn" onclick="closeSettings()">確定開始</button>
  </div>
</div>

<div class="locked-toast" id="lockedToast">🔒 已鎖定，需輸入密碼解鎖</div>

<!-- 密碼面板 -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-panel">
    <h3 id="pinTitle">設定密碼</h3>
    <div class="pin-sub" id="pinSub">請輸入 4 位數字密碼</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput(1)">1</button>
      <button class="pin-key" onclick="pinInput(2)">2</button>
      <button class="pin-key" onclick="pinInput(3)">3</button>
      <button class="pin-key" onclick="pinInput(4)">4</button>
      <button class="pin-key" onclick="pinInput(5)">5</button>
      <button class="pin-key" onclick="pinInput(6)">6</button>
      <button class="pin-key" onclick="pinInput(7)">7</button>
      <button class="pin-key" onclick="pinInput(8)">8</button>
      <button class="pin-key" onclick="pinInput(9)">9</button>
      <button class="pin-key cancel" onclick="pinCancel()">取消</button>
      <button class="pin-key" onclick="pinInput(0)">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<script>
// ===== 活動資料 =====
const DEFAULT_ACTIVITIES = [
  {name:'🎻 練琴', minutes:25, penalty:true},
  {name:'📖 寫功課', minutes:25, penalty:true},
  {name:'📚 閱讀', minutes:20, penalty:true},
];
let activities = JSON.parse(localStorage.getItem('pm_activities') || 'null') || DEFAULT_ACTIVITIES.map(a=>({...a}));
let breakMin = parseInt(localStorage.getItem('pm_break')) || 5;
let locked = localStorage.getItem('pm_locked') === 'true';

// ===== 執行狀態 =====
// schedule: [{type:'work',name,minutes,index}, {type:'break',minutes}, ...]
let schedule = [];
let scheduleIdx = 0;
let totalSec = 0;
let remainSec = 0;
let running = false;
let intervalId = null;
let completedActivities = [];
let penaltySec = 0;   // 本活動累計偷滑秒數
let hiddenSince = 0;  // 離開頁面的 timestamp

function buildSchedule(){
  schedule = [];
  activities.forEach((a, i) => {
    schedule.push({type:'work', name:a.name, minutes:a.minutes, actIndex:i, penaltyOn: a.penalty !== false});
    if(i < activities.length - 1){
      schedule.push({type:'break', name:'☕ 休息', minutes:breakMin, penaltyOn: false});
    }
  });
}

function saveActivities(){
  localStorage.setItem('pm_activities', JSON.stringify(activities));
  localStorage.setItem('pm_break', breakMin);
}

// ===== 音效 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playSound(freq, duration){
  if(!audioCtx) audioCtx = new AudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function playAlarm(){
  // 每段結束：三連音 + 上行結尾，約 3 秒
  playSound(880, 0.3);
  setTimeout(()=>playSound(880, 0.3), 400);
  setTimeout(()=>playSound(1100, 0.4), 800);
  setTimeout(()=>playSound(880, 0.3), 1400);
  setTimeout(()=>playSound(988, 0.3), 1800);
  setTimeout(()=>playSound(1100, 0.6), 2200);
}
function playComplete(){
  // 全部完成：歡快上行旋律，約 5 秒
  const melody = [
    [523, 0.25, 0],     // C
    [587, 0.25, 280],   // D
    [659, 0.25, 560],   // E
    [784, 0.35, 840],   // G
    [659, 0.2, 1300],   // E
    [784, 0.2, 1550],   // G
    [880, 0.35, 1800],  // A
    [784, 0.2, 2300],   // G
    [880, 0.2, 2550],   // A
    [1047, 0.5, 2800],  // C5
    [880, 0.2, 3500],   // A
    [1047, 0.2, 3750],  // C5
    [1175, 0.7, 4000],  // D5 (ending)

function updateProgress(){
  const workItems = schedule.filter(s => s.type === 'work');
  const doneCount = completedActivities.length;
  const totalCount = workItems.length;
  const pct = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;
  document.getElementById('totalProgress').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${totalCount} 完成`;
  document.getElementById('progressPct').textContent = pct + '%';

  // 今日累計
  const totalMin = completedActivities.reduce((sum, a) => sum + a.minutes, 0);
  document.getElementById('todayCount').innerHTML = totalMin + ' <span>分鐘專注</span>';

  // 完成列表
  const dl = document.getElementById('doneList');
  if(doneCount === 0){

  } else {
    dl.style.display = 'block';
    dl.innerHTML = '<h3>已完成</h3>' + completedActivities.map(a => {
      const penaltyStr = a.penalty > 0 ? ` <span style="color:#f39c12;font-size:11px">⚠偷滑+${Math.floor(a.penalty/60)>0?Math.floor(a.penalty/60)+'分':''}${a.penalty%60}秒</span>` : '';
      return `<div class="done-item"><span class="check">✓</span> ${a.name} — ${a.minutes}分鐘 <span style="color:#555;font-size:11px">${a.time}</span>${penaltyStr}</div>`;
    }).join('');
  }

  // 全部完成
  const allDone = document.getElementById('allDone');
  if(scheduleIdx >= schedule.length && schedule.length > 0){
    allDone.classList.add('show');
    const totalPenalty = completedActivities.reduce((s, a) => s + (a.penalty || 0), 0);
    let doneText = `共完成 ${doneCount} 項活動，累計 ${totalMin} 分鐘`;
    if(totalPenalty > 0){
      const pp = totalPenalty >= 60 ? Math.floor(totalPenalty/60) + '分' + (totalPenalty%60 > 0 ? totalPenalty%60 + '秒' : '') : totalPenalty + '秒';
      doneText += `\n⚠ 偷滑加時共 ${pp}`;
    }
    document.getElementById('allDoneSub').textContent = doneText;
  } else {
    allDone.classList.remove('show');
  }
}

// ===== 計時器 =====
function loadCurrentPhase(){
  if(scheduleIdx >= schedule.length) return;
  const cur = schedule[scheduleIdx];
  totalSec = cur.minutes * 60;
  remainSec = totalSec;
  penaltySec = 0;
  hiddenSince = 0;
}

function tick(){
  // 用 deadline 計算精確剩餘（防背景 throttle 造成偏差）
  if(timerDeadline > 0){
    remainSec = Math.max(0, Math.round((timerDeadline - Date.now()) / 1000));
  } else {
    remainSec--;
  }

  if(remainSec <= 0){
    clearInterval(intervalId);
    running = false;

    const cur = schedule[scheduleIdx];
    if(cur.type === 'work'){
      playAlarm();
      completedActivities.push({
        name: cur.name,
        minutes: cur.minutes,
        time: new Date().toTimeString().slice(0,5),
        penalty: penaltySec
      });
      saveTodayRecord();
    } else {
      playBreakEnd();
    }

    scheduleIdx++;
    saveState();
    if(scheduleIdx < schedule.length){
      loadCurrentPhase();
      updateDisplay();
      setTimeout(()=>{ if(!running) toggleTimer(); }, 1500);
    } else {
      // 全部排程結束
      playComplete();
      clearState();
      updateDisplay();
      // 確保完成動畫顯示
      document.getElementById('allDone').classList.add('show');
    }
    return;
  }
  updateDisplay();
  const min = Math.floor(remainSec / 60);
  const sec = remainSec % 60;
  const cur = schedule[scheduleIdx];
  document.title = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')} ${cur ? cur.name : ''} - 番茄鐘`;
}

function toggleTimer(){
  if(scheduleIdx >= schedule.length) return;
  if(running){
    clearInterval(intervalId);
    running = false;
    saveState();
  } else {
    if(!audioCtx) audioCtx = new AudioCtx();
    keepAwake();
    running = true;
    timerDeadline = Date.now() + remainSec * 1000;
    intervalId = setInterval(tick, 1000);
    saveState();
  }
  updateDisplay();
}

// ===== 狀態持久化（防背景被殺）=====
let timerDeadline = 0; // 預計結束的 timestamp

function saveState(){
  const state = {
    scheduleIdx,
    remainSec,
    running,
    timerDeadline,
    completedActivities,
    totalSec,
    penaltySec
  };
  localStorage.setItem('pm_state', JSON.stringify(state));
}

function restoreState(){
  const raw = localStorage.getItem('pm_state');
  if(!raw) return false;
  try {
    const state = JSON.parse(raw);
    // 檢查是否同一組活動（防改設定後恢復舊狀態）
    const savedActs = localStorage.getItem('pm_activities');
    buildSchedule();
    if(state.scheduleIdx >= schedule.length) return false;

    scheduleIdx = state.scheduleIdx;
    completedActivities = state.completedActivities || [];
    totalSec = state.totalSec;
    penaltySec = state.penaltySec || 0;

    if(state.running && state.timerDeadline > 0){
      const now = Date.now();
      const cur = schedule[scheduleIdx];
      const saveTime = state.timerDeadline - state.remainSec * 1000;
      const totalAway = Math.max(0, Math.round((now - saveTime) / 1000));
      // 只有該活動有勾選才加罰
      if(cur && cur.penaltyOn && totalAway >= 3){
        penaltySec += totalAway;
        remainSec = state.remainSec + totalAway;
      } else {
        const origRemain = Math.round((state.timerDeadline - now) / 1000);
        remainSec = Math.max(0, origRemain);
      }
      timerDeadline = now + remainSec * 1000;
      running = false;
      updateDisplay();
      if(remainSec > 0) toggleTimer();
      else tick();
      return true;
    } else {
      // 暫停狀態恢復
      remainSec = state.remainSec;
      running = false;
      updateDisplay();
      return true;
    }
  } catch(e){ return false; }
}

function clearState(){
  localStorage.removeItem('pm_state');
}

function skipCurrent(){
  if(locked){ showLockedToast(); return; }
  if(scheduleIdx >= schedule.length) return;
  clearInterval(intervalId);
  running = false;
  scheduleIdx++;
  if(scheduleIdx < schedule.length){
    loadCurrentPhase();

  updateDisplay();
}

function resetAll(){
  if(locked){ showLockedToast(); return; }
  clearInterval(intervalId);
  running = false;
  scheduleIdx = 0;
  completedActivities = [];
  timerDeadline = 0;
  buildSchedule();
  if(schedule.length > 0) loadCurrentPhase();
  clearState();
  updateDisplay();
  document.title = '番茄鐘';
}

// ===== 每日紀錄 & 連續天數 =====
const WEEKDAYS = ['日','一','二','三','四','五','六'];

function getDayRecords(dateStr){
  return JSON.parse(localStorage.getItem('pm_' + dateStr) || '[]');
}

function getRecentDays(n){
  const days = [];
  for(let i = 0; i < n; i++){
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const records = getDayRecords(key);
    const totalMin = records.reduce((s, r) => s + (r.minutes || 0), 0);
    days.push({ date: key, weekday: WEEKDAYS[d.getDay()], records, totalMin, count: records.length });
  }
  return days;
}

function calcStreak(){
  let streak = 0;
  for(let i = 0; i < 365; i++){
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const records = getDayRecords(key);
    if(records.length > 0) streak++;
    else break;
  }
  return streak;
}

function getStarForMin(min){
  if(min >= 90) return '🏆';
  if(min >= 60) return '⭐';
  if(min >= 30) return '👍';
  return '';
}

function openHistory(){
  const days = getRecentDays(30);
  const streak = calcStreak();
  const weekMin = days.slice(0, 7).reduce((s, d) => s + d.totalMin, 0);

  const summary = document.getElementById('streakSummary');
  summary.innerHTML = `
    <div class="streak-num">🔥 ${streak}</div>
    <div class="streak-label">連續天數</div>
    <div class="week-total">近 7 天累計 <b style="color:#e74c3c">${weekMin}</b> 分鐘</div>
  `;

  const list = document.getElementById('historyList');
  const todayStr = new Date().toISOString().slice(0,10);
  const rows = days.filter(d => d.count > 0 || d.date === todayStr);

  if(rows.length === 0){
    list.innerHTML = '<div class="no-record">尚無紀錄</div>';
  } else {
    list.innerHTML = rows.map(d => {
      const isToday = d.date === todayStr;
      const star = getStarForMin(d.totalMin);
      // 按活動名稱分類
      const groups = {};
      d.records.forEach(r => {
        const name = r.name || '未命名';
        if(!groups[name]) groups[name] = { min: 0, count: 0, times: [] };
        groups[name].min += (r.minutes || 0);
        groups[name].count++;
        if(r.time) groups[name].times.push(r.time);
      });
      const groupHtml = Object.entries(groups).map(([name, g]) =>
        `<div class="day-act-group">
          <span class="act-name">${name}</span>
          <span class="act-info"><b>${g.min}</b> 分鐘 × ${g.count}</span>
        </div>
        <div class="day-times">${g.times.join('、')}</div>`
      ).join('');
      return `<div class="day-card${isToday ? ' today' : ''}">
        <div class="day-header">
          <div class="day-date">${d.date.slice(5)} <span class="weekday">週${d.weekday}</span>${isToday ? ' <span style="color:#e74c3c;font-size:11px">今天</span>' : ''}</div>
          <div class="day-summary">
            <div class="day-min">${d.totalMin} <span>分鐘</span></div>
            <span class="star">${star}</span>
          </div>
        </div>
        <div class="day-detail">${groupHtml}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('historyOverlay').classList.add('show');
}

    document.getElementById('pinSub').textContent = '請再輸入一次確認';
    document.getElementById('pinError').textContent = '';

  } else if(pinMode === 'confirm'){
    if(pinBuffer === pinFirstEntry){
      // 設定成功
      pinCode = pinBuffer;
      localStorage.setItem('pm_pin', pinCode);
      locked = true;
      localStorage.setItem('pm_locked', 'true');
      updateLockUI();
      document.getElementById('pinOverlay').classList.remove('show');

      document.getElementById('pinError').textContent = '兩次密碼不一致，請重新設定';

      pinFirstEntry = '';

        document.getElementById('pinSub').textContent = '請輸入 4 位數字密碼';
      }, 300);

      wrongCount = 0;
      localStorage.setItem('pm_locked', 'false');
      updateLockUI();
      document.getElementById('pinOverlay').classList.remove('show');

      wrongCount++;
      if(wrongCount >= 10){
        document.getElementById('pinError').textContent = '錯誤 ' + wrongCount + ' 次，長按 🔒 10 秒可強制解鎖';
      } else {
        document.getElementById('pinError').textContent = '密碼錯誤（' + wrongCount + '/10）';
      }
      shakeDotsAndClear();
    }
  }
}

function updateLockUI(){
  document.getElementById('lockIcon').innerHTML = locked ? SVG_LOCKED : IMG_UNLOCKED;
  document.getElementById('lockLabel').textContent = locked ? '已鎖' : '未鎖';
  document.getElementById('lockLabel').style.color = locked ? '#ff6b6b' : '#fff';
  // 鎖定時進入全螢幕，解鎖時退出
  if(locked){
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if(rfs) rfs.call(el).catch(()=>{});
  } else {
    const efs = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    if(efs && document.fullscreenElement) efs.call(document).catch(()=>{});
  }
}

function showLockedToast(){
  const t = document.getElementById('lockedToast');
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}

// 長按 10 秒強制解鎖（需先錯 5 次）
const lockBtnEl = document.getElementById('lockBtn');
function startForceUnlock(){
  if(!locked || wrongCount < 5) return;
  forceUnlockStart = Date.now();
  forceUnlockTimer = setTimeout(()=>{
    locked = false;
    wrongCount = 0;
    pinCode = '';
    localStorage.removeItem('pm_pin');
    localStorage.setItem('pm_locked', 'false');
    updateLockUI();
    document.getElementById('pinOverlay').classList.remove('show');
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  }, 10000);
}
function cancelForceUnlock(){
  if(forceUnlockTimer){
    clearTimeout(forceUnlockTimer);
    forceUnlockTimer = null;
  }
}
lockBtnEl.addEventListener('touchstart', startForceUnlock);
lockBtnEl.addEventListener('touchend', cancelForceUnlock);
lockBtnEl.addEventListener('touchcancel', cancelForceUnlock);
lockBtnEl.addEventListener('mousedown', startForceUnlock);
lockBtnEl.addEventListener('mouseup', cancelForceUnlock);

// ===== 防止螢幕休眠 =====
let wakeLockRef = null;
async function keepAwake(){
  try {
    if('wakeLock' in navigator){
      wakeLockRef = await navigator.wakeLock.request('screen');
    }
  } catch(e){}
}

// ===== 初始化：優先恢復存檔 =====
updateLockUI();
updateStreakDisplay();
if(!restoreState()){
  buildSchedule();
  if(schedule.length > 0) loadCurrentPhase();
  updateDisplay();
}

// ===== 頁面離開 / 回來時處理 =====
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    if(running){
      hiddenSince = Date.now();
      saveState();
    }
  } else {
    // 回到前景：偷滑時間加罰（僅限有勾選的活動）
    if(running && timerDeadline > 0){
      const cur = schedule[scheduleIdx];
      if(hiddenSince > 0 && cur && cur.penaltyOn){
        const awaySec = Math.round((Date.now() - hiddenSince) / 1000);
        if(awaySec >= 3){
          penaltySec += awaySec;
          const remainAtHide = Math.max(0, Math.round((timerDeadline - hiddenSince) / 1000));
          remainSec = remainAtHide + awaySec;
          timerDeadline = Date.now() + remainSec * 1000;
        }
      }
      hiddenSince = 0;
      const newRemain = Math.round((timerDeadline - Date.now()) / 1000);
      if(newRemain <= 0){
        remainSec = 0;
        clearInterval(intervalId);
        tick();
      } else {
        remainSec = newRemain;
        clearInterval(intervalId);
        intervalId = setInterval(tick, 1000);
        updateDisplay();
      }
    } else if(!running && localStorage.getItem('pm_state')){
      // 可能頁面被凍結後恢復，嘗試還原
      restoreState();
    }
    // 重新申請螢幕常亮
    if(running) keepAwake();
  }
});
// bfcache 恢復（iOS Safari 常見）
window.addEventListener('pageshow', (e)=>{
  if(e.persisted) restoreState();
});
window.addEventListener('beforeunload', ()=>{
  if(running) saveState();
});

// ===== 全螢幕守護：鎖定時退出全螢幕會自動重進 =====
document.addEventListener('fullscreenchange', ()=>{
  if(locked && !document.fullscreenElement){
    setTimeout(()=>{
      if(locked){
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullscreen;
        if(rfs) rfs.call(el).catch(()=>{});
      }
    }, 500);
  }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
