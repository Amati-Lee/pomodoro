<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>番茄鐘</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overscroll-behavior:none;touch-action:pan-x pan-y}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,#e74c3c,#c0392b);padding:14px 20px;text-align:center;position:relative}
.header h1{font-size:20px;font-weight:600;color:#fff}
.header .ver{font-size:11px;opacity:.6;color:#fff}
.lock-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
.gear-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;cursor:pointer;padding:4px}

/* 活動列表 */
.activity-bar{background:#16213e;padding:8px 12px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.activity-bar::-webkit-scrollbar{display:none}
.act-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;margin-right:6px;background:#2d2d4e;color:#888;border:2px solid transparent;cursor:pointer;transition:.2s}
.act-chip.current{background:#e74c3c22;color:#e74c3c;border-color:#e74c3c;font-weight:600}
.act-chip.done{background:#27ae6033;color:#27ae60;border-color:#27ae60;text-decoration:line-through}
.act-chip.break-chip{background:#27ae6022;color:#666;font-size:11px;padding:4px 8px}
.act-chip.break-chip.current{color:#27ae60;border-color:#27ae60}

.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.timer-ring{position:relative;width:240px;height:240px;margin-bottom:16px}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring .bg{fill:none;stroke:#2d2d4e;stroke-width:8}
.timer-ring .progress{fill:none;stroke:#e74c3c;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.timer-ring.break .progress{stroke:#27ae60}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-text .activity-name{font-size:15px;color:#ccc;margin-bottom:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timer-text .time{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-text .label{font-size:13px;color:#888;margin-top:2px}

.controls{display:flex;gap:16px;margin-bottom:16px}
.ctrl-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{transform:scale(.9)}
.btn-start{background:#e74c3c;color:#fff}
.btn-start.running{background:#f39c12}
.btn-reset{background:#333;color:#aaa}
.btn-skip{background:#333;color:#aaa}

/* 進度與統計 */
.progress-section{width:100%;max-width:340px;margin-bottom:12px}
.progress-bar-bg{background:#2d2d4e;border-radius:8px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12);border-radius:8px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:4px}

.stats{background:#16213e;border-radius:12px;padding:12px 20px;text-align:center;width:100%;max-width:340px}
.stats .today{font-size:13px;color:#888}
.stats .count{font-size:28px;font-weight:700;color:#e74c3c;margin:2px 0}
.stats .count span{font-size:13px;font-weight:400;color:#888}
.stats .total-time{font-size:12px;color:#666}

/* 完成列表 */
.done-list{width:100%;max-width:340px;margin-top:12px}
.done-list h3{font-size:12px;color:#666;margin-bottom:6px}
.done-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:#888}
.done-item .check{color:#27ae60}

/* 設定面板 */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 0}
.settings-overlay.show{display:flex}
.settings-panel{background:#1a1a2e;border-radius:16px;padding:20px;width:92%;max-width:380px;border:1px solid #333}
.settings-panel h2{font-size:18px;margin-bottom:12px;text-align:center}

.act-list{margin-bottom:12px}
.act-row{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px;background:#16213e;border-radius:10px}
.act-row input[type=text]{flex:1;min-width:0;background:#0f0f23;border:1px solid #333;border-radius:6px;padding:8px;font-size:14px;color:#fff;outline:none}
.act-row input[type=text]:focus{border-color:#e74c3c}
.act-row .min-adj{display:flex;align-items:center;gap:4px}
.act-row .min-btn{width:28px;height:28px;border-radius:50%;border:1px solid #555;background:#2d2d4e;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.act-row .min-btn:active{background:#e74c3c}
.act-row .min-val{font-size:15px;font-weight:600;min-width:28px;text-align:center}
.act-row .del-btn{background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;padding:4px}

.add-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:#2d2d4e;border:1px dashed #555;border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;margin-bottom:12px}
.add-act-btn:active{background:#333}

.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-row label{font-size:14px;color:#ccc}
.setting-row .adjuster{display:flex;align-items:center;gap:8px}
.adj-btn{width:32px;height:32px;border-radius:50%;border:1px solid #555;background:#2d2d4e;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.adj-btn:active{background:#e74c3c}
.adj-val{font-size:18px;font-weight:600;min-width:32px;text-align:center}

.settings-panel .close-btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:8px;padding:10px 32px;color:#fff;font-size:15px;cursor:pointer}

/* 預設活動按鈕 */
.preset-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-btn{padding:5px 10px;border-radius:14px;border:1px solid #555;background:#2d2d4e;color:#ccc;font-size:12px;cursor:pointer}
.preset-btn:active{background:#e74c3c;color:#fff}

/* 鎖定提示 */
.locked-toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#e74c3c;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:200;white-space:nowrap}
.locked-toast.show{display:block;animation:fadeout 2s forwards}
@keyframes fadeout{0%,70%{opacity:1}100%{opacity:0;display:none}}

/* 密碼面板 */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center}
.pin-overlay.show{display:flex}
.pin-panel{background:#1a1a2e;border-radius:16px;padding:24px;width:85%;max-width:300px;border:1px solid #333;text-align:center}
.pin-panel h3{font-size:16px;margin-bottom:6px;color:#fff}
.pin-panel .pin-sub{font-size:12px;color:#888;margin-bottom:16px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #555;transition:.15s}
.pin-dot.filled{background:#e74c3c;border-color:#e74c3c}
.pin-dot.wrong{border-color:#e74c3c;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{background:#2d2d4e;border:none;border-radius:50%;width:56px;height:56px;font-size:22px;color:#fff;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;transition:.1s}
.pin-key:active{background:#e74c3c;transform:scale(.9)}
.pin-key.del{font-size:16px;color:#e74c3c;background:transparent;border:1px solid #555}
.pin-key.cancel{font-size:13px;color:#888;background:transparent}
.pin-error{color:#e74c3c;font-size:12px;margin-top:10px;min-height:16px}

/* 全部完成 */
.all-done{display:none;text-align:center;padding:40px 20px}
.all-done.show{display:block}
.all-done .big{font-size:60px;margin-bottom:12px}
.all-done .msg{font-size:18px;color:#27ae60;font-weight:600}
.all-done .sub{font-size:14px;color:#888;margin-top:8px}
</style>
</head>
<body>

<div class="header">
  <button class="gear-btn" onclick="openSettings()">⚙️</button>
  <h1>🍅 番茄鐘 <span class="ver">v1.3</span></h1>
  <button class="lock-btn" id="lockBtn" onclick="toggleLock()">🔓</button>
</div>

<div class="activity-bar" id="activityBar"></div>

<div class="main">
  <div class="timer-ring" id="timerRing">
    <svg viewBox="0 0 200 200">
      <circle class="bg" cx="100" cy="100" r="90"/>
      <circle class="progress" id="progressRing" cx="100" cy="100" r="90"
        stroke-dasharray="565.49" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="activity-name" id="activityName"></div>
      <div class="time" id="timeDisplay">25:00</div>
      <div class="label" id="phaseLabel">準備開始</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-reset" onclick="resetAll()" title="重頭開始">↺</button>
    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">▶</button>
    <button class="ctrl-btn btn-skip" onclick="skipCurrent()" title="跳過">⏭</button>
  </div>

  <div class="progress-section">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="totalProgress"></div></div>
    <div class="progress-label">
      <span id="progressText">0 / 0 完成</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div class="stats">
    <div class="today">今日累計</div>
    <div class="count" id="todayCount">0 <span>分鐘專注</span></div>
  </div>

  <div class="done-list" id="doneList">
    <h3>已完成</h3>
  </div>

  <div class="all-done" id="allDone">
    <div class="big">🎉</div>
    <div class="msg">全部完成！</div>
    <div class="sub" id="allDoneSub"></div>
  </div>
</div>

<!-- 設定面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h2>⚙️ 活動排程</h2>
    <div class="preset-row">
      <button class="preset-btn" onclick="addPreset('🎻 練琴',25)">🎻 練琴</button>
      <button class="preset-btn" onclick="addPreset('📖 寫功課',25)">📖 寫功課</button>
      <button class="preset-btn" onclick="addPreset('📚 閱讀',20)">📚 閱讀</button>
      <button class="preset-btn" onclick="addPreset('🧮 數學',25)">🧮 數學</button>
      <button class="preset-btn" onclick="addPreset('🎨 畫畫',20)">🎨 畫畫</button>
      <button class="preset-btn" onclick="addPreset('🏃 運動',15)">🏃 運動</button>
    </div>
    <div class="act-list" id="actList"></div>
    <button class="add-act-btn" onclick="addActivity()">＋ 新增活動</button>
    <div class="setting-row">
      <label>☕ 休息時間（每項之間）</label>
      <div class="adjuster">
        <button class="adj-btn" onclick="adjustBreak(-1)">−</button>
        <span class="adj-val" id="breakVal">5</span><span style="color:#888">分</span>
        <button class="adj-btn" onclick="adjustBreak(1)">+</button>
      </div>
    </div>
    <button class="close-btn" onclick="closeSettings()">確定開始</button>
  </div>
</div>

<div class="locked-toast" id="lockedToast">🔒 已鎖定，需輸入密碼解鎖</div>

<!-- 密碼面板 -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-panel">
    <h3 id="pinTitle">設定密碼</h3>
    <div class="pin-sub" id="pinSub">請輸入 4 位數字密碼</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput(1)">1</button>
      <button class="pin-key" onclick="pinInput(2)">2</button>
      <button class="pin-key" onclick="pinInput(3)">3</button>
      <button class="pin-key" onclick="pinInput(4)">4</button>
      <button class="pin-key" onclick="pinInput(5)">5</button>
      <button class="pin-key" onclick="pinInput(6)">6</button>
      <button class="pin-key" onclick="pinInput(7)">7</button>
      <button class="pin-key" onclick="pinInput(8)">8</button>
      <button class="pin-key" onclick="pinInput(9)">9</button>
      <button class="pin-key cancel" onclick="pinCancel()">取消</button>
      <button class="pin-key" onclick="pinInput(0)">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<script>
// ===== 活動資料 =====
const DEFAULT_ACTIVITIES = [
  {name:'🎻 練琴', minutes:25},
  {name:'📖 寫功課', minutes:25},
  {name:'📚 閱讀', minutes:20},
];
let activities = JSON.parse(localStorage.getItem('pm_activities') || 'null') || DEFAULT_ACTIVITIES.map(a=>({...a}));
let breakMin = parseInt(localStorage.getItem('pm_break')) || 5;
let locked = localStorage.getItem('pm_locked') === 'true';

// ===== 執行狀態 =====
// schedule: [{type:'work',name,minutes,index}, {type:'break',minutes}, ...]
let schedule = [];
let scheduleIdx = 0;
let totalSec = 0;
let remainSec = 0;
let running = false;
let intervalId = null;
let completedActivities = [];

function buildSchedule(){
  schedule = [];
  activities.forEach((a, i) => {
    schedule.push({type:'work', name:a.name, minutes:a.minutes, actIndex:i});
    if(i < activities.length - 1){
      schedule.push({type:'break', name:'☕ 休息', minutes:breakMin});
    }
  });
}

function saveActivities(){
  localStorage.setItem('pm_activities', JSON.stringify(activities));
  localStorage.setItem('pm_break', breakMin);
}

// ===== 音效 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playSound(freq, duration){
  if(!audioCtx) audioCtx = new AudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function playAlarm(){
  playSound(880, 0.3);
  setTimeout(()=>playSound(880, 0.3), 400);
  setTimeout(()=>playSound(1100, 0.5), 800);
}
function playComplete(){
  playSound(523, 0.2);
  setTimeout(()=>playSound(659, 0.2), 200);
  setTimeout(()=>playSound(784, 0.2), 400);
  setTimeout(()=>playSound(1047, 0.4), 600);
}

// ===== 環形進度 =====
const circumference = 2 * Math.PI * 90;
function updateRing(){
  const pct = totalSec > 0 ? remainSec / totalSec : 0;
  document.getElementById('progressRing').style.strokeDashoffset = circumference * pct;
}

// ===== 活動橫條 =====
function renderActivityBar(){
  const bar = document.getElementById('activityBar');
  bar.innerHTML = '';
  schedule.forEach((s, i) => {
    const chip = document.createElement('span');
    if(s.type === 'break'){
      chip.className = 'act-chip break-chip' + (i === scheduleIdx ? ' current' : '') + (i < scheduleIdx ? ' done' : '');
      chip.textContent = `${s.minutes}m`;
    } else {
      chip.className = 'act-chip' + (i === scheduleIdx ? ' current' : '') + (i < scheduleIdx ? ' done' : '');
      chip.textContent = `${s.name} ${s.minutes}m`;
    }
    bar.appendChild(chip);
  });
  // 自動捲到當前
  const current = bar.querySelector('.current');
  if(current) current.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

// ===== 顯示 =====
function updateDisplay(){
  const min = Math.floor(remainSec / 60);
  const sec = remainSec % 60;
  document.getElementById('timeDisplay').textContent =
    String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  updateRing();

  const cur = schedule[scheduleIdx];
  const ring = document.getElementById('timerRing');
  if(cur && cur.type === 'break'){
    ring.classList.add('break');
    document.getElementById('activityName').textContent = '☕ 休息一下';
    document.getElementById('phaseLabel').textContent = running ? '休息中...' : '休息時間';
  } else if(cur){
    ring.classList.remove('break');
    document.getElementById('activityName').textContent = cur.name;
    document.getElementById('phaseLabel').textContent = running ? '專注中...' : '準備開始';
  }

  const btn = document.getElementById('startBtn');
  if(running){
    btn.textContent = '⏸';
    btn.classList.add('running');
  } else {
    btn.textContent = '▶';
    btn.classList.remove('running');
  }

  renderActivityBar();
  updateProgress();
}

function updateProgress(){
  const workItems = schedule.filter(s => s.type === 'work');
  const doneCount = completedActivities.length;
  const totalCount = workItems.length;
  const pct = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;
  document.getElementById('totalProgress').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${totalCount} 完成`;
  document.getElementById('progressPct').textContent = pct + '%';

  // 今日累計
  const totalMin = completedActivities.reduce((sum, a) => sum + a.minutes, 0);
  document.getElementById('todayCount').innerHTML = totalMin + ' <span>分鐘專注</span>';

  // 完成列表
  const dl = document.getElementById('doneList');
  if(doneCount === 0){
    dl.style.display = 'none';
  } else {
    dl.style.display = 'block';
    dl.innerHTML = '<h3>已完成</h3>' + completedActivities.map(a =>
      `<div class="done-item"><span class="check">✓</span> ${a.name} — ${a.minutes}分鐘 <span style="color:#555;font-size:11px">${a.time}</span></div>`
    ).join('');
  }

  // 全部完成
  const allDone = document.getElementById('allDone');
  if(doneCount >= totalCount && totalCount > 0 && scheduleIdx >= schedule.length){
    allDone.classList.add('show');
    document.getElementById('allDoneSub').textContent = `共完成 ${totalCount} 項活動，累計 ${totalMin} 分鐘`;
  } else {
    allDone.classList.remove('show');
  }
}

// ===== 計時器 =====
function loadCurrentPhase(){
  if(scheduleIdx >= schedule.length) return;
  const cur = schedule[scheduleIdx];
  totalSec = cur.minutes * 60;
  remainSec = totalSec;
}

function tick(){
  if(remainSec <= 0){
    clearInterval(intervalId);
    running = false;

    const cur = schedule[scheduleIdx];
    if(cur.type === 'work'){
      playAlarm();
      completedActivities.push({
        name: cur.name,
        minutes: cur.minutes,
        time: new Date().toTimeString().slice(0,5)
      });
      saveTodayRecord();
    } else {
      playSound(660, 0.3);
    }

    scheduleIdx++;
    if(scheduleIdx < schedule.length){
      loadCurrentPhase();
      updateDisplay();
      // 自動開始下一項（休息或活動）
      setTimeout(()=>{ if(!running) toggleTimer(); }, 1500);
    } else {
      // 全部完成
      playComplete();
      updateDisplay();
    }
    return;
  }
  remainSec--;
  updateDisplay();
  const min = Math.floor(remainSec / 60);
  const sec = remainSec % 60;
  const cur = schedule[scheduleIdx];
  document.title = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')} ${cur ? cur.name : ''} - 番茄鐘`;
}

function toggleTimer(){
  if(scheduleIdx >= schedule.length) return;
  if(running){
    clearInterval(intervalId);
    running = false;
  } else {
    if(!audioCtx) audioCtx = new AudioCtx();
    keepAwake();
    running = true;
    intervalId = setInterval(tick, 1000);
  }
  updateDisplay();
}

function skipCurrent(){
  if(locked){ showLockedToast(); return; }
  if(scheduleIdx >= schedule.length) return;
  clearInterval(intervalId);
  running = false;
  scheduleIdx++;
  if(scheduleIdx < schedule.length){
    loadCurrentPhase();
  }
  updateDisplay();
}

function resetAll(){
  if(locked){ showLockedToast(); return; }
  clearInterval(intervalId);
  running = false;
  scheduleIdx = 0;
  completedActivities = [];
  buildSchedule();
  if(schedule.length > 0) loadCurrentPhase();
  updateDisplay();
  document.title = '番茄鐘';
}

// ===== 今日紀錄（跨 session 累計）=====
function todayKey(){ return 'pm_' + new Date().toISOString().slice(0,10); }
function saveTodayRecord(){
  const existing = JSON.parse(localStorage.getItem(todayKey()) || '[]');
  const last = completedActivities[completedActivities.length - 1];
  existing.push(last);
  localStorage.setItem(todayKey(), JSON.stringify(existing));
}

// ===== 設定面板 =====
let editActivities = [];

function openSettings(){
  if(locked){ showLockedToast(); return; }
  if(running) return;
  editActivities = activities.map(a=>({...a}));
  renderEditList();
  document.getElementById('breakVal').textContent = breakMin;
  document.getElementById('settingsOverlay').classList.add('show');
}

function renderEditList(){
  const list = document.getElementById('actList');
  list.innerHTML = '';
  editActivities.forEach((a, i) => {
    const row = document.createElement('div');
    row.className = 'act-row';
    row.innerHTML = `
      <input type="text" value="${a.name}" onchange="editActivities[${i}].name=this.value" placeholder="活動名稱">
      <div class="min-adj">
        <button class="min-btn" onclick="adjEditMin(${i},-5)">−</button>
        <span class="min-val" id="editMin${i}">${a.minutes}</span><span style="color:#888;font-size:12px">分</span>
        <button class="min-btn" onclick="adjEditMin(${i},5)">+</button>
      </div>
      <button class="del-btn" onclick="delEditAct(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function adjEditMin(i, delta){
  editActivities[i].minutes = Math.max(5, Math.min(60, editActivities[i].minutes + delta));
  document.getElementById('editMin'+i).textContent = editActivities[i].minutes;
}

function delEditAct(i){
  if(editActivities.length <= 1) return;
  editActivities.splice(i, 1);
  renderEditList();
}

function addActivity(){
  editActivities.push({name:'📝 新活動', minutes:25});
  renderEditList();
  // 捲到底
  const list = document.getElementById('actList');
  list.lastChild.scrollIntoView({behavior:'smooth'});
}

function addPreset(name, minutes){
  editActivities.push({name, minutes});
  renderEditList();
}

function adjustBreak(delta){
  breakMin = Math.max(1, Math.min(30, breakMin + delta));
  document.getElementById('breakVal').textContent = breakMin;
}

function closeSettings(){
  // 讀取 input 最新值
  const inputs = document.querySelectorAll('#actList input[type=text]');
  inputs.forEach((inp, i) => { if(editActivities[i]) editActivities[i].name = inp.value; });
  activities = editActivities.map(a=>({...a}));
  saveActivities();
  document.getElementById('settingsOverlay').classList.remove('show');
  resetAll();
}

function closeSettingsOutside(e){
  if(e.target === document.getElementById('settingsOverlay')) closeSettings();
}

// ===== 密碼鎖 =====
let pinCode = localStorage.getItem('pm_pin') || ''; // 存的密碼
let pinBuffer = '';
let pinMode = ''; // 'set' | 'confirm' | 'unlock'
let pinFirstEntry = '';
let wrongCount = 0;
let forceUnlockTimer = null;
let forceUnlockStart = 0;

function toggleLock(){
  if(locked){
    // 解鎖：輸入密碼
    pinMode = 'unlock';
    pinBuffer = '';
    document.getElementById('pinTitle').textContent = '🔓 輸入密碼';
    document.getElementById('pinSub').textContent = '請輸入 4 位數字密碼解鎖';
    document.getElementById('pinError').textContent = '';
    updatePinDots();
    document.getElementById('pinOverlay').classList.add('show');
  } else {
    // 鎖定：先設密碼
    pinMode = 'set';
    pinBuffer = '';
    pinFirstEntry = '';
    document.getElementById('pinTitle').textContent = '🔒 設定密碼';
    document.getElementById('pinSub').textContent = '請輸入 4 位數字密碼';
    document.getElementById('pinError').textContent = '';
    updatePinDots();
    document.getElementById('pinOverlay').classList.add('show');
  }
}

function pinInput(n){
  if(pinBuffer.length >= 4) return;
  pinBuffer += n;
  updatePinDots();
  if(pinBuffer.length === 4){
    setTimeout(handlePinComplete, 200);
  }
}

function pinDelete(){
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}

function pinCancel(){
  document.getElementById('pinOverlay').classList.remove('show');
  pinBuffer = '';
}

function updatePinDots(){
  for(let i = 0; i < 4; i++){
    const dot = document.getElementById('dot'+i);
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('wrong');
  }
}

function shakeDotsAndClear(){
  for(let i = 0; i < 4; i++){
    const dot = document.getElementById('dot'+i);
    dot.classList.add('wrong');
    dot.classList.remove('filled');
  }
  pinBuffer = '';
  if(navigator.vibrate) navigator.vibrate(200);
}

function handlePinComplete(){
  if(pinMode === 'set'){
    // 第一次輸入
    pinFirstEntry = pinBuffer;
    pinBuffer = '';
    pinMode = 'confirm';
    document.getElementById('pinTitle').textContent = '🔒 確認密碼';
    document.getElementById('pinSub').textContent = '請再輸入一次確認';
    document.getElementById('pinError').textContent = '';
    updatePinDots();
  } else if(pinMode === 'confirm'){
    if(pinBuffer === pinFirstEntry){
      // 設定成功
      pinCode = pinBuffer;
      localStorage.setItem('pm_pin', pinCode);
      locked = true;
      localStorage.setItem('pm_locked', 'true');
      updateLockUI();
      document.getElementById('pinOverlay').classList.remove('show');
    } else {
      document.getElementById('pinError').textContent = '兩次密碼不一致，請重新設定';
      shakeDotsAndClear();
      pinMode = 'set';
      pinFirstEntry = '';
      setTimeout(()=>{
        document.getElementById('pinTitle').textContent = '🔒 設定密碼';
        document.getElementById('pinSub').textContent = '請輸入 4 位數字密碼';
      }, 300);
    }
  } else if(pinMode === 'unlock'){
    if(pinBuffer === pinCode){
      // 解鎖成功
      locked = false;
      wrongCount = 0;
      localStorage.setItem('pm_locked', 'false');
      updateLockUI();
      document.getElementById('pinOverlay').classList.remove('show');
      if(navigator.vibrate) navigator.vibrate(100);
    } else {
      wrongCount++;
      if(wrongCount >= 10){
        document.getElementById('pinError').textContent = '錯誤 ' + wrongCount + ' 次，長按 🔒 10 秒可強制解鎖';
      } else {
        document.getElementById('pinError').textContent = '密碼錯誤（' + wrongCount + '/10）';
      }
      shakeDotsAndClear();
    }
  }
}

function updateLockUI(){
  document.getElementById('lockBtn').textContent = locked ? '🔒' : '🔓';
  // 鎖定時進入全螢幕，解鎖時退出
  if(locked){
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if(rfs) rfs.call(el).catch(()=>{});
  } else {
    const efs = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    if(efs && document.fullscreenElement) efs.call(document).catch(()=>{});
  }
}

function showLockedToast(){
  const t = document.getElementById('lockedToast');
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}

// 長按 10 秒強制解鎖（需先錯 5 次）
const lockBtnEl = document.getElementById('lockBtn');
function startForceUnlock(){
  if(!locked || wrongCount < 5) return;
  forceUnlockStart = Date.now();
  forceUnlockTimer = setTimeout(()=>{
    locked = false;
    wrongCount = 0;
    pinCode = '';
    localStorage.removeItem('pm_pin');
    localStorage.setItem('pm_locked', 'false');
    updateLockUI();
    document.getElementById('pinOverlay').classList.remove('show');
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  }, 10000);
}
function cancelForceUnlock(){
  if(forceUnlockTimer){
    clearTimeout(forceUnlockTimer);
    forceUnlockTimer = null;
  }
}
lockBtnEl.addEventListener('touchstart', startForceUnlock);
lockBtnEl.addEventListener('touchend', cancelForceUnlock);
lockBtnEl.addEventListener('touchcancel', cancelForceUnlock);
lockBtnEl.addEventListener('mousedown', startForceUnlock);
lockBtnEl.addEventListener('mouseup', cancelForceUnlock);

// ===== 防止螢幕休眠 =====
let wakeLockRef = null;
async function keepAwake(){
  try {
    if('wakeLock' in navigator){
      wakeLockRef = await navigator.wakeLock.request('screen');
    }
  } catch(e){}
}

// ===== 初始化 =====
updateLockUI();
buildSchedule();
if(schedule.length > 0) loadCurrentPhase();
updateDisplay();

// ===== 全螢幕守護：鎖定時退出全螢幕會自動重進 =====
document.addEventListener('fullscreenchange', ()=>{
  if(locked && !document.fullscreenElement){
    setTimeout(()=>{
      if(locked){
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullscreen;
        if(rfs) rfs.call(el).catch(()=>{});
      }
    }, 500);
  }
});

// ===== 背景恢復：切回來時補上離開的時間 =====
let timerStartedAt = 0; // 當前階段開始的 timestamp
let timerStartRemain = 0; // 開始時剩餘秒數

const _origToggle = toggleTimer;
toggleTimer = function(){
  _origToggle();
  if(running){
    timerStartedAt = Date.now();
    timerStartRemain = remainSec;
  }
};

document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && running && timerStartedAt > 0){
    const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
    remainSec = Math.max(0, timerStartRemain - elapsed);
    updateDisplay();
    if(remainSec <= 0) tick(); // 觸發完成
  }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
